<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#060a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TIPSTER PRO IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08061a;--bg2:#0f0b26;--bg3:#15102e;--bg4:#1c1640;
  --sf:rgba(139,92,246,.04);--sf2:rgba(139,92,246,.07);--sf3:rgba(139,92,246,.12);
  --bd:rgba(139,92,246,.12);--bd2:rgba(139,92,246,.22);--bd3:rgba(139,92,246,.35);
  --tx:#eef2ff;--tx2:#a8b2d8;--tx3:#4a4270;--tx4:#2e2850;
  --cy:#00e5b4;--cy2:#00b894;--cyd:rgba(0,229,180,.10);--cyb:rgba(0,229,180,.28);--cys:rgba(0,229,180,.05);
  --pu:#a78bfa;--pu2:#8b5cf6;--pud:rgba(139,92,246,.15);--pub:rgba(139,92,246,.38);--pus:rgba(139,92,246,.07);
  --am:#f59e0b;--amd:rgba(245,158,11,.12);--amb:rgba(245,158,11,.3);
  --bl:#60a5fa;--bld:rgba(96,165,250,.12);--blb:rgba(96,165,250,.28);
  --re:#f87171;--red:rgba(248,113,113,.12);--reb:rgba(248,113,113,.3);
  --gr:#10b981;--grd:rgba(16,185,129,.12);--grb:rgba(16,185,129,.3);
  --nfl:#ff6b35;--nfld:rgba(255,107,53,.12);--nflb:rgba(255,107,53,.3);
  --rd:16px;--rds:10px;--rdxs:6px;
  --hf:'Barlow Condensed',sans-serif;
  --bf:'Barlow',sans-serif;
  --shadow-card:0 4px 28px rgba(0,0,0,.55);
  --shadow-glow-cy:0 0 32px rgba(0,229,180,.12);
  --shadow-glow-pu:0 0 36px rgba(139,92,246,.22);
  --shadow-glow-am:0 0 32px rgba(245,158,11,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:var(--bf);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ─── ORBS ──────────────────────────────────────── */
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.14;animation:drift 18s ease-in-out infinite alternate;}
.ob1{width:600px;height:600px;background:#6d28d9;top:-200px;left:-140px;}
.ob2{width:480px;height:480px;background:#4c1d95;top:25%;right:-120px;animation-delay:-7s;}
.ob3{width:360px;height:360px;background:#312e81;bottom:5%;left:8%;animation-delay:-13s;}
.ob4{width:280px;height:280px;background:#7c3aed;bottom:-60px;right:6%;animation-delay:-4s;}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(28px,20px) scale(1.08)}}

/* ─── TOPBAR ─────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:200;background:linear-gradient(180deg,rgba(13,9,32,.96) 0%,rgba(8,6,26,.92) 100%);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid rgba(139,92,246,.18);box-shadow:0 1px 40px rgba(109,40,217,.12);}
.tb-inner{max-width:920px;margin:0 auto;padding:0 18px;}
.tb-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 0 9px;}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--hf);font-size:21px;font-weight:900;letter-spacing:-.3px;}
.logo-circle{width:32px;height:32px;border-radius:50%;background:#0a0720;border:2px solid #8b5cf6;box-shadow:0 0 10px #8b5cf699,0 0 22px #8b5cf633,inset 0 0 8px #8b5cf618;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-t{color:#a78bfa;text-shadow:0 0 14px #8b5cf688;}
.logo-p{color:#eef2ff;}
.tb-right{display:flex;align-items:center;gap:10px;}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--pud);border:1px solid var(--pub);color:var(--pu);font-family:var(--hf);font-size:9px;font-weight:800;letter-spacing:1.5px;padding:4px 10px;border-radius:99px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--pu);animation:blink 1.6s ease-in-out infinite;}
.hdr-date .hdr-d2 span{color:var(--pu);font-weight:700;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.6)}}
.hdr-date .hdr-d1{font-family:var(--hf);font-size:12px;font-weight:700;color:var(--tx);text-align:right;}
.hdr-date .hdr-d2{font-size:10px;color:var(--tx3);text-align:right;margin-top:1px;}
.hdr-date .hdr-d2 span{color:var(--bl);font-weight:700;}

/* ─── TABS ───────────────────────────────────────── */
.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;padding-bottom:0;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tabs{padding:4px 0 6px;}
.tab-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;font-family:var(--hf);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer;transition:all .2s;color:var(--tx3);background:transparent;border-radius:99px;position:relative;}
.tab-btn:hover{color:var(--tx2);background:rgba(139,92,246,.06);}
.tab-btn.active{color:#fff;background:linear-gradient(135deg,#7c3aed,#a78bfa);box-shadow:0 2px 16px rgba(139,92,246,.35);}
.tab-btn svg{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.tab-btn.active svg{opacity:1;}
.tab-ct{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:15px;border-radius:99px;font-size:9px;font-weight:800;padding:0 4px;background:var(--pud);border:1px solid var(--pub);color:var(--pu);}
.tab-ct.zero{background:var(--sf);border-color:var(--bd);color:var(--tx4);}
.tab-btn.active .tab-ct{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.35);color:#fff;}

/* ─── MAIN ───────────────────────────────────────── */
.main{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:22px 18px 70px;}
.section{display:none;animation:fadeUp .3s ease both;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ─── SECTION HEADER ─────────────────────────────── */
.sh{display:flex;align-items:center;gap:10px;margin:28px 0 14px;}
.sh-ico{width:30px;height:30px;border-radius:var(--rds);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sh-ico svg{width:16px;height:16px;}
.sh-title{font-family:var(--hf);font-size:18px;font-weight:800;letter-spacing:-.2px;}
.sh-line{flex:1;height:1px;background:var(--bd);}
.sh-ct{font-family:var(--hf);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);}

/* ─── DATE HERO ──────────────────────────────────── */
.date-hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
.dh-eyebrow{font-family:var(--hf);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.dh-eyebrow::after{content:'';flex:1;height:1px;background:var(--bd);}
.dh-title{font-family:var(--hf);font-size:48px;font-weight:900;line-height:.9;letter-spacing:-1.5px;}
.dh-grad{background:linear-gradient(105deg,#00e5b4,#60a5fa 55%,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dh-sub{font-family:var(--hf);font-size:10px;letter-spacing:2.5px;color:var(--tx3);text-transform:uppercase;margin-top:8px;}
.dh-sub b{color:var(--tx2);}
.dh-stats{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.dst{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rd);padding:12px 16px;text-align:center;min-width:76px;}
.dst-v{font-family:var(--hf);font-size:28px;font-weight:900;line-height:1;}
.dst-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-top:3px;font-weight:600;}
/* NUEVO HERO REPORT */
.hero-report{border-radius:var(--rd);border:1px solid var(--bd);background:var(--sf);overflow:hidden;margin-bottom:22px;}
.hr-top{background:linear-gradient(90deg,rgba(0,229,180,.1),rgba(96,165,250,.06),transparent);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hr-brand{display:flex;align-items:center;gap:10px;}
.hr-brand-ico{width:36px;height:36px;border-radius:var(--rds);background:var(--cyd);border:1px solid var(--cyb);display:flex;align-items:center;justify-content:center;}
.hr-brand-txt{}
.hr-brand-name{font-family:var(--hf);font-size:16px;font-weight:900;letter-spacing:-.3px;background:linear-gradient(105deg,#00e5b4,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hr-brand-sub{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-top:1px;}
.hr-date{text-align:right;}
.hr-date-main{font-family:var(--hf);font-size:15px;font-weight:800;letter-spacing:-.2px;color:var(--tx);}
.hr-date-sub{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-top:2px;}
.hr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;}
.hrs{padding:14px 8px;text-align:center;border-right:1px solid var(--bd);position:relative;}
.hrs:last-child{border-right:none;}
.hrs-v{font-family:var(--hf);font-size:30px;font-weight:900;line-height:1;}
.hrs-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-top:3px;font-weight:600;}
.hrs-bar{position:absolute;bottom:0;left:10%;right:10%;height:2px;border-radius:99px;}
.hr-sports{padding:10px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sport-tag{font-family:var(--hf);font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:99px;border:1px solid;}
.st-mlb{color:var(--cy);background:var(--cyd);border-color:var(--cyb);}
.st-nba{color:var(--am);background:var(--amd);border-color:var(--amb);}
.st-futbol{color:var(--gr);background:var(--grd);border-color:var(--grb);}
.st-nfl{color:var(--nfl);background:var(--nfld);border-color:var(--nflb);}
.hr-method{margin-left:auto;font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);}
@media(max-width:500px){.hr-stats{grid-template-columns:repeat(2,1fr);}.hrs:nth-child(2){border-right:none;}.hrs:nth-child(3){border-top:1px solid var(--bd)}}

/* ─── NEWS BAR ───────────────────────────────────── */
.news-bar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rds);padding:10px 14px;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.news-tag{font-family:var(--hf);font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);background:var(--pud);border:1px solid var(--pub);padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.news-txt{font-size:11px;color:var(--tx2);line-height:1.5;}

/* ─── MINI MENÚ DE DEPORTES ──────────────────────── */
.sport-menu{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.sm-item{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rd);padding:14px 8px;cursor:pointer;transition:border-color .2s,transform .15s;}
.sm-item:hover{transform:translateY(-2px);border-color:var(--bd2);}
.sm-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.sm-label{font-family:var(--hf);font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--tx2);}
.sm-count{font-size:9px;color:var(--tx3);}
@media(max-width:500px){.sport-menu{grid-template-columns:repeat(2,1fr);}}

/* ─── TEAM LOGO ──────────────────────────────────── */
.t-logo{display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;}
.t-logo img{width:100%;height:100%;object-fit:contain;display:block;}
.t-logo .t-init{font-family:var(--hf);font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;letter-spacing:1px;}
.t-flag{font-size:1em;line-height:1;}

/* ─── GOLD PICK CARD ─────────────────────────────── */
.gold-card{position:relative;border-radius:var(--rd);border:1px solid var(--pub);background:linear-gradient(140deg,rgba(139,92,246,.1) 0%,var(--bg2) 55%);box-shadow:var(--shadow-glow-pu),var(--shadow-card);overflow:hidden;margin-bottom:20px;transition:box-shadow .25s;}
.gold-card:hover{box-shadow:0 0 56px rgba(139,92,246,.28),var(--shadow-card);}
.gold-topbar{height:3px;background:linear-gradient(90deg,#7c3aed,#a78bfa,#60a5fa);box-shadow:0 0 14px #8b5cf6;}
.gold-badge{position:absolute;top:16px;right:16px;font-family:var(--hf);font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--pub);color:var(--pu);padding:4px 12px;border-radius:99px;background:var(--pud);}
.gc-inner{padding:20px 22px;}
.gc-ctx{font-family:var(--hf);font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:14px;}
.gc-matchup{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.gc-team{display:flex;align-items:center;gap:10px;}
.gc-tname{font-family:var(--hf);font-size:36px;font-weight:900;letter-spacing:-1px;line-height:1;}
.gc-tname.away{color:var(--tx2);}
.gc-tname.home{color:var(--tx);}
.gc-vs{font-family:var(--hf);font-size:13px;font-weight:700;color:var(--tx4);flex-shrink:0;padding:0 4px;}
.gc-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.badge-pick{font-family:var(--hf);font-size:14px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;background:linear-gradient(135deg,#6d28d9,#7c3aed,#a78bfa);border:none;color:#fff;padding:8px 22px;border-radius:99px;box-shadow:0 0 24px rgba(139,92,246,.55),0 2px 10px rgba(0,0,0,.4);cursor:default;position:relative;overflow:hidden;}
.badge-pick::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 60%);border-radius:99px;}
.badge-ev{font-family:var(--hf);font-size:14px;font-weight:900;background:var(--grd);border:1px solid var(--grb);color:var(--gr);padding:6px 16px;border-radius:var(--rds);box-shadow:0 0 14px rgba(16,185,129,.18);}
.badge-ev.high{background:rgba(16,185,129,.2);border-color:var(--gr);box-shadow:0 0 22px rgba(16,185,129,.3);}
.badge-tipo{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--bld);border:1px solid var(--blb);color:var(--bl);padding:4px 11px;border-radius:99px;}
.badge-cuota{font-family:var(--hf);font-size:12px;font-weight:700;color:var(--pu);border:1px solid var(--pub);padding:4px 11px;border-radius:99px;background:var(--pud);}
.badge-verified{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--gr);background:var(--grd);border:1px solid var(--grb);padding:3px 8px;border-radius:99px;}
.badge-estimated{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--am);background:var(--amd);border:1px solid var(--amb);padding:3px 8px;border-radius:99px;}
/* ─── RESULTADO BADGES ───────────────────────────── */
.res-win{display:inline-flex;align-items:center;gap:5px;font-family:var(--hf);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#059669,#10b981);border:1px solid #10b981;padding:4px 12px;border-radius:99px;box-shadow:0 0 14px rgba(16,185,129,.35);}
.res-loss{display:inline-flex;align-items:center;gap:5px;font-family:var(--hf);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#dc2626,#f87171);border:1px solid #f87171;padding:4px 12px;border-radius:99px;box-shadow:0 0 14px rgba(248,113,113,.3);}
.res-push{display:inline-flex;align-items:center;gap:5px;font-family:var(--hf);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--tx2);background:var(--sf2);border:1px solid var(--bd2);padding:4px 12px;border-radius:99px;}
.res-pending{display:inline-flex;align-items:center;gap:5px;font-family:var(--hf);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);background:var(--sf);border:1px solid var(--bd);padding:4px 12px;border-radius:99px;}
.res-score{font-size:9px;font-weight:600;opacity:.75;}
.day-results-bar{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rd);padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.drb-stat{display:flex;flex-direction:column;align-items:center;min-width:44px;}
.drb-v{font-family:var(--hf);font-size:22px;font-weight:900;line-height:1;}
.drb-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-top:2px;}
.drb-div{width:1px;height:32px;background:var(--bd);}
.drb-roi{font-family:var(--hf);font-size:13px;font-weight:800;margin-left:auto;}
.drb-roi.pos{color:var(--gr);}
.drb-roi.neg{color:var(--re);}
.drb-roi.neu{color:var(--tx3);}
.gc-analysis{background:rgba(255,255,255,.025);border:1px solid var(--bd);border-left:3px solid var(--cyb);border-radius:0 var(--rds) var(--rds) 0;padding:11px 14px;margin-bottom:16px;font-size:12px;line-height:1.65;color:var(--tx2);max-height:80px;overflow:hidden;position:relative;transition:max-height .4s cubic-bezier(.22,1,.36,1),padding .3s;}
.gc-analysis.expanded{max-height:500px;}
.gc-analysis-fade{position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(transparent,rgba(18,12,40,.85));display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;cursor:pointer;transition:opacity .3s;}
.gc-analysis.expanded .gc-analysis-fade{display:none;}
.gc-toggle{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--pu);background:var(--pud);border:1px solid var(--pub);padding:3px 12px;border-radius:99px;cursor:pointer;margin-top:6px;display:inline-block;}
@keyframes gc-pulse{0%,100%{box-shadow:var(--shadow-glow-pu),var(--shadow-card);}50%{box-shadow:0 0 40px rgba(139,92,246,.32),var(--shadow-card);}}
.gold-card{animation:gc-pulse 4s ease-in-out infinite;}
.prob-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.prob-lbl{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);}
.prob-pct{font-family:var(--hf);font-size:24px;font-weight:900;color:var(--pu);}
.prob-bar{height:5px;background:var(--sf2);border-radius:99px;overflow:hidden;}
.prob-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:99px;transition:width 1.1s cubic-bezier(.22,1,.36,1);width:0;}
.gc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bd);}
.stars{display:flex;gap:3px;}
.star{font-size:15px;}
.star-on-pu{color:var(--pu);filter:drop-shadow(0 0 5px rgba(139,92,246,.6));}
.star-on-cy{color:var(--cy);filter:drop-shadow(0 0 5px rgba(0,229,180,.55));}
.star-on-am{color:var(--am);filter:drop-shadow(0 0 4px rgba(245,158,11,.5));}
.star-on-gray{color:var(--tx2);}
.star-off{color:rgba(255,255,255,.08);}
.stake-pill{font-family:var(--hf);font-size:11px;font-weight:700;letter-spacing:.8px;background:var(--sf2);border:1px solid var(--bd2);color:var(--tx2);padding:5px 14px;border-radius:99px;}
/* ─── CUOTA MÍNIMA CON VALOR (anclada al mercado sharp Pinnacle) ─── */
.value-box{display:flex;flex-wrap:wrap;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(0,229,180,.08),rgba(96,165,250,.05));border:1px solid var(--cyb);border-radius:var(--rds);padding:12px 16px;margin:14px 0;}
.vb-item{display:flex;flex-direction:column;gap:2px;}
.vb-l{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);}
.vb-v{font-family:var(--hf);font-size:20px;font-weight:900;line-height:1;color:var(--tx);}
.vb-v.vb-strong{font-size:26px;color:var(--cy);text-shadow:0 0 12px rgba(0,229,180,.4);}
.vb-note{flex:1;min-width:160px;font-size:10.5px;color:var(--tx2);line-height:1.5;}
.vb-note b{color:var(--cy);}
.cuotas{display:flex;gap:10px;align-items:center;}
.cq{font-family:var(--hf);font-size:11px;font-weight:700;color:var(--tx3);}
.cq span{color:var(--tx2);}

/* ─── PICK CARDS GRID ────────────────────────────── */
.picks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:12px;margin-bottom:20px;}
.pick-card{border-radius:var(--rd);border:1px solid var(--bd);background:var(--sf);overflow:hidden;cursor:pointer;transition:transform .18s,border-color .22s,box-shadow .22s;}
.pick-card:hover{transform:translateY(-3px);}
.pick-card.s5{border-color:var(--pub);box-shadow:var(--shadow-glow-pu),0 2px 12px rgba(0,0,0,.35);}
.pick-card.s5:hover{box-shadow:0 0 44px rgba(139,92,246,.3),0 4px 24px rgba(0,0,0,.5);}
.pick-card.s4{border-color:var(--cyb);box-shadow:var(--shadow-glow-cy),0 2px 12px rgba(0,0,0,.3);}
.pick-card.s4:hover{box-shadow:0 0 40px rgba(0,229,180,.25),0 4px 20px rgba(0,0,0,.45);}
.pick-card.s3{border-color:var(--amb);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.pick-card.s3:hover{box-shadow:var(--shadow-glow-am),0 4px 20px rgba(0,0,0,.45);}
.pick-card.s1:hover,.pick-card.s2:hover{box-shadow:0 4px 20px rgba(0,0,0,.4);}
.pc-stripe{height:3px;}
.pc-s5{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
.pc-s4{background:linear-gradient(90deg,#00b894,#00e5b4);}
.pc-s3{background:linear-gradient(90deg,#f59e0b,#ef4444);}
.pc-s1,.pc-s2{background:var(--bg4);}
.pc-inner{padding:14px 15px;}
.pc-ctx{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;}
.pc-teams{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.pc-vs{font-family:var(--hf);font-size:10px;color:var(--tx4);flex-shrink:0;}
.pc-name{font-family:var(--hf);font-size:18px;font-weight:800;letter-spacing:-.3px;text-transform:uppercase;line-height:1.1;}
.pc-mid{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px;}
.pc-pick{font-family:var(--hf);font-size:12px;font-weight:800;text-transform:uppercase;color:var(--pu);letter-spacing:.3px;background:var(--pud);border:1px solid var(--pub);padding:5px 12px;border-radius:99px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%;}
.pc-ev{font-family:var(--hf);font-size:14px;font-weight:900;color:var(--gr);}
.pc-cuota{font-family:var(--hf);font-size:12px;font-weight:800;color:var(--pu);background:var(--pud);border:1px solid var(--pub);padding:3px 9px;border-radius:var(--rdxs);}
.pc-min{font-family:var(--hf);font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--cy);background:var(--cyd);border:1px solid var(--cyb);border-radius:var(--rdxs);padding:4px 9px;margin-bottom:9px;display:inline-block;}
.pc-min b{font-size:12px;}
.pc-pbar{height:3px;background:var(--sf2);border-radius:99px;overflow:hidden;margin-bottom:9px;}
.pc-pfill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:99px;transition:width 1s cubic-bezier(.22,1,.36,1);width:0;}
.pc-reason{font-size:11px;color:var(--tx3);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--bd);}
.pc-stars{display:flex;gap:2px;}
.pc-star{font-size:11px;}
.pc-tipo{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--bl);background:var(--bld);border:1px solid var(--blb);padding:2px 8px;border-radius:99px;}
.pc-stake{font-family:var(--hf);font-size:10px;font-weight:700;color:var(--tx3);background:var(--sf2);border:1px solid var(--bd);padding:2px 8px;border-radius:99px;}
.pc-detail{display:none;background:var(--bg3);border-top:1px solid var(--bd);padding:12px 15px;}
.pc-detail.open{display:block;}
.pd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px;}
.pd-cell{background:var(--bg4);border:1px solid var(--bd);border-radius:var(--rdxs);padding:8px 6px;text-align:center;}
.pd-v{font-family:var(--hf);font-size:15px;font-weight:800;}
.pd-l{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-top:2px;}
.pd-txt{font-size:11px;color:var(--tx2);line-height:1.6;}

/* ─── PARLAY ─────────────────────────────────────── */
.parlay-card{border-radius:var(--rd);border:1px solid var(--pub);background:linear-gradient(135deg,rgba(167,139,250,.07),var(--bg2));box-shadow:var(--shadow-glow-pu),var(--shadow-card);overflow:hidden;margin-bottom:20px;}
.parlay-head{background:linear-gradient(90deg,rgba(167,139,250,.12),transparent);border-bottom:1px solid var(--pub);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.parlay-title{font-family:var(--hf);font-size:17px;font-weight:900;color:var(--pu);letter-spacing:.2px;}
.parlay-sub{font-family:var(--hf);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin-top:3px;}
.parlay-big{font-family:var(--hf);font-size:38px;font-weight:900;color:var(--pu);line-height:1;}
.parlay-big-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-top:2px;}
.parlay-body{padding:16px 20px;}
.pl-legs{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.pl-leg{display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rds);padding:10px 14px;}
.pl-num{font-family:var(--hf);font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--pu);background:var(--pud);border:1px solid var(--pub);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pl-txt{font-family:var(--hf);font-size:13px;font-weight:700;flex:1;text-transform:uppercase;}
.pl-cuota{font-family:var(--hf);font-size:13px;font-weight:800;color:var(--pu);}
.pl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pls{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rds);padding:10px 8px;text-align:center;}
.pls-v{font-family:var(--hf);font-size:20px;font-weight:900;}
.pls-l{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-top:3px;}
.parlay-note{font-size:11px;color:var(--tx3);line-height:1.65;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);}

/* ─── BANKROLL CALC ──────────────────────────────── */
.calc-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rd);padding:18px 20px;margin-bottom:20px;}
.calc-title{font-family:var(--hf);font-size:15px;font-weight:800;letter-spacing:.2px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.calc-icon{width:26px;height:26px;border-radius:var(--rdxs);background:var(--amd);border:1px solid var(--amb);display:flex;align-items:center;justify-content:center;}
.calc-icon svg{width:14px;height:14px;color:var(--am);}
.calc-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.calc-lbl{font-family:var(--hf);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);}
.calc-curr{font-family:var(--hf);font-size:14px;font-weight:700;color:var(--tx2);}
.calc-input{background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rds);color:var(--tx);font-family:var(--hf);font-size:22px;font-weight:800;padding:8px 14px;width:170px;outline:none;transition:border-color .15s;}
.calc-input:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(0,229,180,.08);}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.ci{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rds);padding:10px 12px;}
.ci-pick{font-family:var(--hf);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--tx2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-amt{font-family:var(--hf);font-size:22px;font-weight:900;color:var(--cy);line-height:1;}
.ci-pct{font-size:10px;color:var(--tx3);margin-top:1px;}

/* ─── EXEC TABLE ─────────────────────────────────── */
.exec-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;}
.exec-table th{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);padding:10px 12px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;}
.exec-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.exec-table tr:hover td{background:var(--sf);}
.et-pick{font-family:var(--hf);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;}
.et-match{font-size:10px;color:var(--tx3);margin-top:1px;font-family:var(--hf);font-weight:700;letter-spacing:.5px;}
.et-tipo{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--bl);background:var(--bld);border:1px solid var(--blb);padding:2px 8px;border-radius:99px;white-space:nowrap;}
.et-cuota{font-family:var(--hf);font-size:14px;font-weight:800;}
.et-ev{font-family:var(--hf);font-size:14px;font-weight:800;}

/* ─── NO APOSTAR ─────────────────────────────────── */
.na-card{display:flex;gap:12px;align-items:flex-start;background:rgba(248,113,113,.04);border:1px solid var(--reb);border-radius:var(--rds);padding:13px 15px;margin-bottom:8px;}
.na-ico{width:28px;height:28px;border-radius:var(--rdxs);background:var(--red);border:1px solid var(--reb);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.na-ico svg{width:13px;height:13px;color:var(--re);}
.na-liga{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--re);margin-bottom:3px;}
.na-match{font-family:var(--hf);font-size:14px;font-weight:800;text-transform:uppercase;margin-bottom:3px;}
.na-razon{font-size:11px;color:var(--tx3);line-height:1.55;}

/* ─── EMPTY STATE ────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;padding:56px 20px;text-align:center;gap:12px;}
.empty-icon{width:52px;height:52px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;}
.empty-icon svg{width:24px;height:24px;opacity:.4;}
.empty-title{font-family:var(--hf);font-size:19px;font-weight:800;color:var(--tx2);}
.empty-sub{font-size:12px;color:var(--tx3);max-width:270px;line-height:1.65;}
.empty-pill{font-family:var(--hf);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--pu);background:var(--pud);border:1px solid var(--pub);padding:5px 14px;border-radius:99px;}

/* ─── BOTTOM STATS ───────────────────────────────── */
.b-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.bs{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rd);padding:14px;text-align:center;}
.bs-v{font-family:var(--hf);font-size:22px;font-weight:900;}
.bs-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-top:3px;font-weight:600;}

/* ─── DAY NAVIGATOR ─────────────────────────────── */
.day-nav{display:flex;align-items:center;justify-content:center;gap:0;padding:7px 0 0;}
.day-nav-btn{background:none;border:none;cursor:pointer;color:var(--tx3);padding:5px 10px;border-radius:8px;transition:color .15s,background .15s;display:flex;align-items:center;justify-content:center;}
.day-nav-btn:hover:not(:disabled){color:var(--pu);background:var(--pus);}
.day-nav-btn:disabled{opacity:.2;cursor:default;}
.day-nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.day-nav-center{display:flex;align-items:center;gap:6px;padding:5px 16px;border-radius:99px;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;transition:border-color .15s;min-width:170px;justify-content:center;}
.day-nav-center:hover{border-color:var(--bd2);}
.day-nav-label{font-family:var(--hf);font-size:13px;font-weight:800;letter-spacing:.3px;color:var(--tx);text-transform:uppercase;}
.day-nav-today{font-family:var(--hf);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--pu);background:var(--pud);border:1px solid var(--pub);padding:2px 7px;border-radius:99px;}
.day-nav-chevron{width:12px;height:12px;stroke:var(--tx3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ─── LOADING ────────────────────────────────────── */
#loadScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:110px 20px;gap:14px;position:relative;z-index:1;}
.spin{width:34px;height:34px;border-radius:50%;border:2px solid rgba(0,229,180,.12);border-top-color:var(--cy);animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.load-txt{font-family:var(--hf);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);}
#app{display:none;}

@media(max-width:500px){
  .dh-title{font-size:36px;}
  .picks-grid{grid-template-columns:1fr;}
  .gc-tname{font-size:28px;}
  .pl-stats{grid-template-columns:repeat(2,1fr);}
  .b-stats{grid-template-columns:repeat(2,1fr);}
  .pd-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
var DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function fmtDate(d){return DIAS[d.getDay()]+' '+d.getDate()+' de '+MESES[d.getMonth()]+' '+d.getFullYear();}

function tick(){
  var n=new Date();
  // Próxima 12:30 AM hora CDMX (UTC-5) = 05:30 UTC
  var utcMs=n.getTime()+n.getTimezoneOffset()*60000;
  var cdmxNow=new Date(utcMs-5*3600000);
  var next=new Date(cdmxNow);
  next.setHours(0,30,0,0);
  if(cdmxNow>=next)next.setDate(next.getDate()+1);
  var dt=next-cdmxNow,e=document.getElementById('cdwn');
  if(e)e.textContent=pad(Math.floor(dt/3600000))+':'+pad(Math.floor(dt%3600000/60000))+':'+pad(Math.floor(dt%60000/1000));
}
setInterval(tick,1000);tick();

function switchTab(id){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var s=document.getElementById('sec-'+id);if(s)s.classList.add('active');
  var b=document.querySelector('[data-tab="'+id+'"]');if(b)b.classList.add('active');
}

function getSport(liga){
  var l=(liga||'').toLowerCase();
  if(l.includes('mlb'))return'mlb';

  if(l.includes('liga')||l.includes('premier')||l.includes('mls')||l.includes('futbol')||l.includes('fútbol')||l.includes('soccer'))return'futbol';
  if(l.includes('nfl')||l.includes('american football')||l.includes('football'))return'nfl';
  return'otros';
}
function parseTeams(matchup){
  var m=matchup||'';
  if(m.indexOf(' @ ')>-1){var p=m.split(' @ ');return{away:p[0].trim().toUpperCase(),home:(p[1]||'').trim().toUpperCase()};}
  if(m.toLowerCase().indexOf(' vs ')>-1){var p=m.split(/ vs /i);return{away:p[0].trim().toUpperCase(),home:(p[1]||'').trim().toUpperCase()};}
  return{away:m.toUpperCase(),home:''};
}

// ─── PARLAY ───────────────────────────────────────────────────────────────────
function buildParlay(pl){
  if(!pl||!pl.patas||!pl.patas.length)return'';
  var legs=pl.patas.map(function(pt,i){
    var raw=typeof pt==='string'?pt:JSON.stringify(pt);
    var m=raw.match(/^(.*?)\s*\(cuota\s*([\d.]+)\)$/i);
    var nm=m?m[1].trim().toUpperCase():raw.toUpperCase();
    var cq=m?m[2]:'';
    return'<div class="pl-leg"><div class="pl-num">L'+(i+1)+'</div><div class="pl-txt">'+nm+'</div>'+(cq?'<div class="pl-cuota">'+cq+'</div>':'')+' </div>';
  }).join('');
  return'<div class="parlay-card">'+
    '<div class="parlay-head">'+

// ─── SPORT SECTION ────────────────────────────────────────────────────────────
function buildSport(allPicks,allNA,sport,label,icoId){
  var picks=allPicks.filter(function(p){return getSport(p.liga)===sport;});
  var na=allNA.filter(function(p){
    var l=(p.liga||'').toLowerCase();
    return(sport==='mlb'&&l.includes('mlb'))||(sport==='nba'&&l.includes('nba'))||
           (sport==='futbol'&&(l.includes('liga')||l.includes('premier')||l.includes('futbol')||l.includes('fútbol')))||
           (sport==='nfl'&&(l.includes('nfl')||l.includes('football')));
  });
  var wrap=document.createElement('div');
  var hdr='<div class="sh"><div class="sh-ico" style="background:var(--cyd);color:var(--cy)">'+useIco(icoId)+'</div><div class="sh-title">'+label+'</div><div class="sh-line"></div><div class="sh-ct">'+picks.length+' PICKS</div></div>';
  var body='';
  if(!picks.length){
    var emptyMsg=sport==='nfl'
      ?'<div class="empty">'+
          '<div class="empty-icon" style="color:var(--nfl)">'+useIco(icoId,24)+'</div>'+
          '<div class="empty-title" style="color:var(--nfl)">TEMPORADA NFL</div>'+
          '<div class="empty-sub">La temporada regular NFL 2026 inicia en septiembre. Esta sección se activará automáticamente cuando haya juegos disponibles.</div>'+
          '<div class="empty-pill" style="color:var(--nfl);background:var(--nfld);border-color:var(--nflb)">ACTIVA EN SEP 2026 · DRAFT MAYO</div>'+
        '</div>'
      :'<div class="empty">'+
          '<div class="empty-icon" style="color:var(--tx3)">'+useIco(icoId,24)+'</div>'+
          '<div class="empty-title">SIN PICKS HOY</div>'+
          '<div class="empty-sub">No se identificó valor esperado positivo en '+label+'. Vuelve mañana a las 12:30 AM para el siguiente análisis.</div>'+
          '<div class="empty-pill">PRÓXIMO ANÁLISIS 12:30 AM CDMX</div>'+
        '</div>';
    body=emptyMsg;
  } else {
    body='<div class="picks-grid" id="pgrid-'+sport+'"></div>';
  }
  var naHtml='';
  if(na.length){
    naHtml+='<div class="sh" style="margin-top:20px"><div class="sh-ico" style="background:var(--red);color:var(--re)">'+useIco('ico-ban')+'</div><div class="sh-title">NO APOSTAR</div><div class="sh-line"></div></div>';
    na.forEach(function(n){
      naHtml+='<div class="na-card"><div class="na-ico">'+useIco('ico-alert')+'</div>'+
        '<div><div class="na-liga">'+(n.liga||'').toUpperCase()+'</div>'+
        '<div class="na-match">'+(n.matchup||'').toUpperCase()+'</div>'+
        '<div class="na-razon">'+(n.razon||'')+'</div></div></div>';
    });
  }
  wrap.innerHTML=hdr+body+naHtml;
  return{el:wrap,picks:picks};
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function resBadge(r){
  if(r.resultado==='win')
    return '<span class="res-win">✓ WIN'+(r.score?'<span class="res-score">'+r.score+'</span>':'')+'</span>';
  if(r.resultado==='loss')
    return '<span class="res-loss">✗ LOSS'+(r.score?'<span class="res-score">'+r.score+'</span>':'')+'</span>';
  if(r.resultado==='push')
    return '<span class="res-push">— PUSH'+(r.score?'<span class="res-score">'+r.score+'</span>':'')+'</span>';
  return '<span class="res-pending">⏳ PENDIENTE</span>';
}

function applyResults(resData){
  if(!resData||!resData.picks)return;
  var cards=document.querySelectorAll('.pick-card[data-matchup],.gold-card[data-matchup]');
  resData.picks.forEach(function(r){
    var mu=(r.matchup||'').toLowerCase();
    var pk=(r.pick||'').toLowerCase();
    cards.forEach(function(card){
      if(card.dataset.matchup===mu||card.dataset.pick===pk){
        // Eliminar badge previo si existe
        var old=card.querySelector('.res-badge-wrap');
        if(old)old.remove();
        var wrap=document.createElement('div');
        wrap.className='res-badge-wrap';
        wrap.style.cssText='padding:6px 15px 0;';
        wrap.innerHTML=resBadge(r);
        var inner=card.querySelector('.pc-inner,.gc-inner');
        if(inner)inner.insertBefore(wrap,inner.firstChild);
        // Borde verde/rojo en la card
        if(r.resultado==='win'){card.style.borderColor='rgba(16,185,129,.5)';card.style.boxShadow='0 0 20px rgba(16,185,129,.18)';}
        else if(r.resultado==='loss'){card.style.borderColor='rgba(248,113,113,.45)';card.style.boxShadow='0 0 20px rgba(248,113,113,.15)';}
      }
    });
  });

  // Barra de resumen del día
  var sm=resData.resumen;
  if(!sm)return;
  var existing=document.getElementById('dayResultsBar');
  if(existing)existing.remove();
  var roi=sm.roi_pct||0;
  var roiClass=roi>0?'pos':roi<0?'neg':'neu';
  var roiStr=(roi>0?'+':'')+roi.toFixed(1)+'% ROI';
  var bar=document.createElement('div');
  bar.id='dayResultsBar';
  bar.className='day-results-bar';
  bar.innerHTML=
    '<div class="drb-stat"><div class="drb-v" style="color:var(--gr)">'+sm.wins+'</div><div class="drb-l">Wins</div></div>'+
    '<div class="drb-stat"><div class="drb-v" style="color:var(--re)">'+sm.losses+'</div><div class="drb-l">Losses</div></div>'+
    '<div class="drb-div"></div>'+
    '<div class="drb-stat"><div class="drb-v" style="color:var(--tx2)">'+sm.pushes+'</div><div class="drb-l">Push</div></div>'+
    '<div class="drb-stat"><div class="drb-v" style="color:var(--tx3)">'+sm.pending+'</div><div class="drb-l">Pend.</div></div>'+
    '<div class="drb-div"></div>'+
    '<div class="drb-stat"><div class="drb-v" style="color:var(--tx2)">'+sm.total+'</div><div class="drb-l">Total</div></div>'+
    '<div class="drb-roi '+roiClass+'">'+roiStr+'</div>';
  // Insertar antes del primer .sh o al inicio de sec-inicio
  var ini=document.getElementById('sec-inicio');
  if(ini)ini.insertBefore(bar,ini.firstChild);
}

function loadResults(dateStr){
  fetch('/results-'+dateStr+'.json')
    .then(function(r){if(!r.ok)throw new Error('no results');return r.json();})
    .then(function(d){applyResults(d);})
    .catch(function(){/* sin resultados aún — silencioso */});
}

// ─── DAY NAVIGATION ──────────────────────────────────────────────────────────
var DAY_OFFSET=0; // 0=hoy, -1=ayer, -2=antes de ayer...

function dateFromOffset(offset){
  var d=new Date();
  d.setDate(d.getDate()+offset);
  return d;
}
function dateStrFromOffset(offset){
  var d=dateFromOffset(offset);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function updateDayNav(){
  var d=dateFromOffset(DAY_OFFSET);
  var dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var label=dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()];
  var lbl=document.getElementById('dayNavLabel');
  if(lbl)lbl.textContent=label;
  // botón siguiente desactivado si ya estamos en hoy
  var btnNext=document.getElementById('btnNextDay');
  if(btnNext)btnNext.disabled=(DAY_OFFSET>=0);
  // botón previo desactivado si llevamos 30 días atrás
  var btnPrev=document.getElementById('btnPrevDay');
  if(btnPrev)btnPrev.disabled=(DAY_OFFSET<=-30);
}
function shiftDay(delta){
  var newOffset=DAY_OFFSET+delta;
  if(newOffset>0||newOffset<-30)return;
  DAY_OFFSET=newOffset;
  loadDay();
}
function goToday(){
  if(DAY_OFFSET===0)return;
  DAY_OFFSET=0;
  loadDay();
}
function showLoading(msg){
  var ls=document.getElementById('loadScreen');
  var app=document.getElementById('app');
  if(ls){ls.style.display='flex';ls.innerHTML='<div class="spin"></div><div class="load-txt">'+(msg||'CARGANDO PICKS...')+'</div>';}
  if(app)app.style.display='none';
}
function loadDay(){
  updateDayNav();
  showLoading('CARGANDO PICKS...');
  switchTab('inicio');
  var ds=dateStrFromOffset(DAY_OFFSET);
  if(DAY_OFFSET===0){
    tryFetch('/latest.json','/picks-'+ds+'.json');
  } else {
    tryFetch('/picks-'+ds+'.json',null);
  }
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
function tryFetch(url,fb){
  var ctrl=new AbortController(),tmo=setTimeout(function(){ctrl.abort();},9000);
  fetch(url,{signal:ctrl.signal})
    .then(function(r){clearTimeout(tmo);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){render(d);loadResults(dateStrFromOffset(DAY_OFFSET));})
    .catch(function(err){
      if(fb){tryFetch(fb,null);}
      else{
        var ls=document.getElementById('loadScreen');
        var ds=dateStrFromOffset(DAY_OFFSET);

// ─── SWIPE ENTRE DEPORTES ──────────────────────────────────────────────────
(function(){
  var TAB_ORDER=['inicio','mlb','nba','futbol','nfl','resumen'];
  var startX=0,startY=0,tracking=false;
  var target=document.getElementById('app');
  target.addEventListener('touchstart',function(e){
    var t=e.touches[0];startX=t.clientX;startY=t.clientY;tracking=true;
  },{passive:true});
  target.addEventListener('touchend',function(e){
    if(!tracking)return;tracking=false;
    var t=e.changedTouches[0];
    var dx=t.clientX-startX,dy=t.clientY-startY;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.3)return;
    var cur=document.querySelector('.tab-btn.active');
    var curId=cur?cur.dataset.tab:'inicio';
    var idx=TAB_ORDER.indexOf(curId);
    if(idx<0)return;
    var next=dx<0?idx+1:idx-1;
    if(next<0||next>=TAB_ORDER.length)return;
    switchTab(TAB_ORDER[next]);
  },{passive:true});
})();
</script>
